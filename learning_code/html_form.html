<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Example</title>
</head>
<body>
<form action="form_submit_test.html" method="GET">
    <fieldset>
        <legend>Personal Information</legend>
        
    <div>
        <input
            type="text"
            id="username"
            name="username"
            value="u6712122@au.edu"
        />
    </div>
    <div>
        <input type="password" id="password" name="password" />
    </div>
    <div>
        <input type="date" id="birthday" name="birthday" /><input
        type="time"
        id="td"
        name="td"
        />
    </div>
        <div>
            <input type="radio" id="male" name="gender" value="male"/>
            
        </div>
        
        
        
    </fieldset>


    <div>
        <label for="f1">Single File:</label>
        <input
            type="file"
            id="f1"
            name="f1"
        />
    </div>




    <div>
        <input type="submit" name="submit" value="Submit Form" />
    </div>
    
    <div>
        <input type="reset" name="reset" value="Reset Form" />
    </div>
</form>

</body>
</html>

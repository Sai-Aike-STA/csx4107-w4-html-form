<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form Elements Assignment</title>

    <style>
        body {
            margin: 0;
            padding: 30px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 18px;
            background-color: white;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
        }

        form {
            width: 100%;
            max-width: 1125px;
        }

        fieldset {
            border: 2px solid lightgray;
            border-radius: 6px;
            margin-bottom: 10px;
            padding: 12px 16px 20px 16px;
        }

        legend {
            padding: 0 4px;
        }

        .form-row {
            /* This makes the children inside .form-row line up horizontally instead of vertically. */
            display: flex; 
            align-items: flex-start;
            /*extra space so the form doesnt look cramped*/
            margin-bottom: 10px;
        }

        label {
            width: 220px;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"] {
            width: 260px;
            height: 30px;
            font-size: 18px;
            padding: 2px 6px;
            box-sizing: border-box;
        }

        textarea {
            width: 875px;
            height: 140px;
            font-size: 18px;
            padding: 6px;
            box-sizing: border-box;
            resize: vertical;
        }

        select {
            width: 155px;
            height: 36px;
            font-size: 18px;
            padding: 4px;
        }

        .inline-group {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .inline-group label {
            width: auto;
            margin-right: 8px;
        }

        input[type="checkbox"],
        input[type="radio"] {
            width: 18px;
            height: 18px;
            margin: 0;
        }

        .submit-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }

        button {
            background-color: blue;
            color: white;
            font-size: 20px;
            padding: 10px 16px;
            border-radius: 6px;
            border: 2px solid black;
            cursor: pointer;
        }
    </style>
</head>

<body>
<form
    action="https://teach-backend-fawn.vercel.app/api/product"
    method="POST"
    enctype="multipart/form-data"
>
    <fieldset>
        <legend>General Info</legend>

        <div class="form-row">
            <label for="itemName">Item Name</label>
            <input
                type="text"
                id="itemName"
                name="itemName"
            >
        </div>

        <div class="form-row">
            <label for="itemDescription">Description</label>
            <textarea
                id="itemDescription"
                name="itemDescription"
            ></textarea>
        </div>

        <div class="form-row">
            <label for="category">Category</label>
            <select id="category" name="category">
                <option value="notSpecified">Not Specified</option>
                <option value="consumption">Consumption</option>
                <option value="household">Household</option>
                <option value="electronic">Electronic</option>
                <option value="gadget">Gadget</option>
            </select>
        </div>
    </fieldset>

    <br>

    <fieldset>
        <legend>Misc.</legend>

        <div class="form-row">
            <label for="inventoryAmount">Inventory Amount</label>
            <input
                type="number"
                id="inventoryAmount"
                name="inventoryAmount"
            >
<!--        input type number makes it so that non-numbers cannot be typed-->
        </div>

        <div class="form-row">
            <label for="listPrice">List price</label>
            <input
                type="number"
                id="listPrice"
                name="listPrice"
            >
        </div>

        <div class="form-row">
            <label>Available Stores</label>

            <div class="inline-group">
                <input
                    type="checkbox"
                    id="bangkok"
                    name="availableStore[]"
                    value="Bangkok"
                >
                <label for="bangkok">Bangkok</label>

                <input
                    type="checkbox"
                    id="pattaya"
                    name="availableStore[]"
                    value="Pattaya"
                >
                <label for="pattaya">Pattaya</label>

                <input
                    type="checkbox"
                    id="phuket"
                    name="availableStore[]"
                    value="Phuket"
                >
                <label for="phuket">Phuket</label>
            </div>
        </div>

        <div class="form-row">
            <label>Status</label>

            <div class="inline-group">
                <input
                    type="radio"
                    id="active"
                    name="status"
                    value="Active"
                >
                <label for="active">Active</label>

                <input
                    type="radio"
                    id="inactive"
                    name="status"
                    value="Inactive"
                >
                <label for="inactive">Inactive</label>
            </div>
        </div>
    </fieldset>
    
    <br>

    <fieldset>
        <legend>Staff</legend>

        <div class="form-row">
            <label for="staffEmail">Staff Email</label>
            <input
                type="email"
                id="staffEmail"
                name="staffEmail"
                value="u6712122@au.edu"
            >
        </div>
    </fieldset>

    <div class="submit-row">
        <button type="submit">Submit Form</button>
    </div>
</form>
</body>
</html>
